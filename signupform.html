<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R1-A3-225230001-정주호</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header id="header">
        <h1>DUICA A3</h1>
        <img src="img/donggukMark.png" alt="동국대 마크">
        <div class="button-wrapper">
            <a href="https://github.com/UND147/R1-A3-225230001-CHENGJUHO" target="_blank" data-tooltip="GitHub 저장소">
                <img src="img/githubimg.png" alt="깃허브 이미지">
            </a>
            <a href="https://und147.github.io/R1-A3-225230001-CHENGJUHO/" target="_blank" data-tooltip="GitHub Pages">
                <img src="img/gitimg.png" alt="깃사이트 이미지">
            </a>
        </div>
        <div class="login-wrapper">
            <input class="iText" type="text" name="user_id" placeholder="아이디">
            <input class="iText" type="password" name="password" placeholder="암호">
            <button type="submit">로그인</button>
            <span class="hLine">
                <a class="a" href="signupform.html">회원가입</a>
            </span>
        </div>
    </header>
    
    <nav>
        <a href="index.html">홈</a>
        <a href="attendance.html">출석체크</a>
        <a href="bookmark.html">북마크</a>
        <a href="language.html">언어요약</a>
        <a href="timetable.html">시간표</a>
        <a href="forminfo.html">자료실</a>
        <a href="textrpg.html">텍스트게임</a>
    </nav>
    
    <div class="inputForm">
        <h2>회원가입</h2>
        <p class="subtitle">DUICA A3 서비스를 이용하기 위해 가입해주세요</p>
        
        <form>
            <div class="form-group">
                <label for="user_id">아이디<span class="required">*</span></label>
                <input class="signup" type="text" id="user_id" name="user_id" placeholder="영문, 숫자 조합 6-20자" required>
            </div>
            
            <div class="form-group">
                <label for="password">비밀번호<span class="required">*</span></label>
                <input class="signup" type="password" id="password" name="password" placeholder="영문, 숫자, 특수문자 조합 8자 이상" required>
                <p class="input-hint">안전한 비밀번호를 위해 영문, 숫자, 특수문자를 조합해주세요</p>
            </div>
            
            <div class="form-group">
                <label for="passwordCheck">비밀번호 확인<span class="required">*</span></label>
                <input class="signup" type="password" id="passwordCheck" name="passwordCheck" placeholder="비밀번호를 다시 입력해주세요" required>
            </div>
            
            <div class="form-group">
                <label for="nickname">닉네임<span class="required">*</span></label>
                <input class="signup" type="text" id="nickname" name="nickname" placeholder="사용할 닉네임" required>
            </div>
            
            <div class="form-group">
                <label for="email">이메일<span class="required">*</span></label>
                <input class="signup" type="email" id="email" name="email" placeholder="example@duica.com" required>
            </div>
            
            <div class="form-group">
                <label for="emailCheck">이메일 확인<span class="required">*</span></label>
                <input class="signup" type="email" id="emailCheck" name="emailCheck" placeholder="이메일을 다시 입력해주세요" required>
            </div>
            
            <div class="button-group">
                <button type="submit">회원가입</button>
                <button type="reset">초기화</button>
            </div>
        </form>
        
        <div class="form-footer">
            이미 계정이 있으신가요?
            <a href="index.html">로그인하기</a>
        </div>
    </div>
</body>
</html>
