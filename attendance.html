<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R1-A3-225230001-정주호</title>
    <link rel="icon" href="img/favicon.ico">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/attendance.css">
</head>
<body>
    <header id="header">
        <h1>DUICA A3</h1> <img src="img/donggukMark.png" alt="동국대 마크">
        <div class="button-wrapper">
            <a href="https://github.com/undcore/R1-A3-225230001-CHENGJUHO" target="_blank" data-tooltip="GitHub 저장소">
                <img src="img/githubimg.png" alt="깃허브 이미지">
            </a>
            <a href="https://undcore.github.io/R1-A3-225230001-CHENGJUHO/" target="_blank" data-tooltip="GitHub Pages">
                <img src="img/gitimg.png" alt="깃사이트 이미지">
            </a>
        </div>
        <div class="login-wrapper">
            <input class="iText" type="text" name="user_id" placeholder="아이디">
            <input class="iText" type="password" name="password" placeholder="암호">
            <button type="submit">로그인</button>
            <span class="hLine">
                <a class="a" href="signupform.html">회원가입</a>
            </span>
        </div>
    </header>

    <!-- 네비게이션 -->
    <nav>
        <a href="index.html">홈</a>
        <a href="attendance.html" class="active">출석체크</a>
        <a href="bookmark.html">북마크</a>
        <a href="language.html">언어요약</a>
        <a href="timetable.html">시간표</a>
        <a href="forminfo.html">자료실</a>
        <a href="textrpg.html">텍스트게임</a>
    </nav>
    <div class="attendance-container">
        <!-- 좌측 프로필 영역 -->
        <aside class="profile-section">
            <div class="profile-image-wrapper">
                <img id="profileImage" class="profile-image" src="img/defaultProfile.png" alt="프로필 이미지">
                <div class="profile-buttons">
                    <button onclick="changeProfileImage()">사진 변경</button>
                    <button onclick="resetProfileImage()">사진 제거</button>
                </div>
                <input type="file" id="profileImageInput" accept="image/*">
            </div>
            
            <div class="profile-info">
                <div class="profile-info-item">
                    <span class="profile-info-label">이름</span>
                    <span class="profile-info-value" id="userName">정주호</span>
                </div>
                <div class="profile-info-item">
                    <span class="profile-info-label">닉네임</span>
                    <span class="profile-info-value" id="userNickname">CHENGJUHO</span>
                </div>
                <div class="profile-info-item">
                    <span class="profile-info-label">누적 출석일수</span>
                    <span class="profile-info-value highlight" id="totalAttendance">42일</span>
                </div>
                <div class="profile-info-item">
                    <span class="profile-info-label">연속 출석일수</span>
                    <span class="profile-info-value highlight" id="consecutiveAttendance">7일</span>
                </div>
                <div class="profile-info-item">
                    <span class="profile-info-label">마지막 출석</span>
                    <span class="profile-info-value" id="lastAttendance">2025-11-17</span>
                </div>
            </div>
        </aside>

        <!-- 우측 출석 영역 -->
        <main class="attendance-section">
            <!-- 명언 카드 -->
            <div class="quote-card">
                <p class="quote-text" id="quoteText"></p>
                <p class="quote-author" id="quoteAuthor"></p>
            </div>

            <!-- 출석 버튼 -->
            <div class="attendance-button-card">
                <p class="attendance-date" id="currentDate"></p>
                <button id="attendanceBtn" onclick="checkAttendance()">오늘의 출석체크</button>
                <p class="attendance-message" id="attendanceMessage"></p>
            </div>

            <!-- 출석 리스트 -->
            <div class="attendance-list-card">
                <div class="attendance-list-header">
                    <h3 class="attendance-list-title">오늘의 출석 현황</h3>
                    <span class="attendance-count">총 <span id="attendanceTotal">0</span>명</span>
                </div>
                <div class="attendance-list" id="attendanceList">
                    <!-- 출석 항목들이 여기에 동적으로 추가됩니다 -->
                </div>
            </div>
        </main>
    </div>

<script src="js/attendance.js"></script>
<script src="js/navigation.js"></script> 
</body>
</html>
</body>
</html>
