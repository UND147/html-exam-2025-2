<script src="js/navigation.js"></script>
<script>
  const ua = navigator.userAgent.toLowerCase();
  function getBrowser() {
    if (ua.includes("chrome") && !ua.includes("edge") && !ua.includes("opr")) return "Chrome";
    if (ua.includes("firefox")) return "Firefox";
    if (ua.includes("safari") && !ua.includes("chrome")) return "Safari";
    if (ua.includes("edg")) return "Edge";
    if (ua.includes("opr") || ua.includes("opera")) return "Opera";
    return "Unknown";
  }
  function getOS() {
    if (ua.includes("windows")) return "Windows";
    if (ua.includes("mac")) return "macOS";
    if (ua.includes("android")) return "Android";
    if (ua.includes("iphone") || ua.includes("ipad")) return "iOS";
    if (ua.includes("linux")) return "Linux";
    return "Unknown";
  }
  function isMobile() {
    return /android|iphone|ipad|mobile/.test(ua);
  }
  // 각각의 span에 할당
  document.getElementById("info-browser").textContent = `"${getBrowser()}"`;
  document.getElementById("info-os").textContent = `"${getOS()}"`;
  document.getElementById("info-device").textContent = `"${isMobile() ? "Mobile" : "Desktop"}"`;
</script>
