    <div class="forminfo-wrapper">
        <!-- 좌측 PDF 목록 -->
        <aside class="pdf-menu">
            <h2 class="pdf-menu-title">자료 목록</h2>
            <div class="pdf-list">
                <button class="pdf-button active" data-pdf="pdf/examReport_Duica.pdf">[듀이카] 컴퓨터공학과 과제물 리포트 양식</button>
                <button class="pdf-button" data-pdf="pdf/applicationForm_officialAbsence.pdf">[듀이카] 공결승인신청서 양식</button>
                <button class="pdf-button" data-pdf="pdf/cppBasic.pdf">[C++부록] C/C++ 기초</button>
                <button class="pdf-button" data-pdf="pdf/dbMssql.pdf">[DB부록] MSSQL 설치</button>
                <button class="pdf-button" data-pdf="pdf/Weekly.pdf">주간계획표</button>
                <button class="pdf-button" data-pdf="pdf/htmlDUICA.pdf">인터넷활용 강의계획서</button>
                <button class="pdf-button" data-pdf="pdf/comArchitecDUICA.pdf">컴퓨터구조 강의계획서</button>
                <button class="pdf-button" data-pdf="pdf/dbDUICA.pdf">데이터베이스 강의계획서</button>
                <button class="pdf-button" data-pdf="pdf/AlgorithmDUICA.pdf">알고리즘 강의계획서</button>
                <button class="pdf-button" data-pdf="pdf/cppDUICA.pdf">객체지향프로그래밍 강의계획서</button>
                <button class="pdf-button" data-pdf="pdf/mobProgDUICA.pdf">모바일프로그래밍 강의계획서</button>
            </div>
        </aside>

        <!-- 우측 PDF 뷰어 -->
        <main class="pdf-viewer-container">
            <div class="pdf-viewer-header">
                <h3 id="current-pdf-title">PDF 뷰어</h3>
                <div class="pdf-controls">
                    <button id="download-btn" class="control-btn" title="다운로드">
                        <span>📥 다운로드</span>
                    </button>
                    <button id="fullscreen-btn" class="control-btn" title="전체화면">
                        <span>⛶ 전체화면</span>
                    </button>
                </div>
            </div>
            <div class="pdf-viewer-content">
                <iframe id="pdf-viewer" src="" frameborder="0"></iframe>
                <div id="pdf-placeholder">
                    <p>📄</p>
                    <p>좌측 목록에서 PDF를 선택하세요</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        // PDF 버튼 클릭 이벤트
        const pdfButtons = document.querySelectorAll('.pdf-button');
        const pdfViewer = document.getElementById('pdf-viewer');
        const pdfPlaceholder = document.getElementById('pdf-placeholder');
        const currentPdfTitle = document.getElementById('current-pdf-title');
        const downloadBtn = document.getElementById('download-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        
        let currentPdfUrl = '';

        pdfButtons.forEach(button => {
            button.addEventListener('click', function() {
                const pdfUrl = this.getAttribute('data-pdf');
                const pdfName = this.textContent.trim();
                
                // 활성 버튼 스타일 변경
                pdfButtons.forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
                
                // PDF 로드
                loadPdf(pdfUrl, pdfName);
            });
        });

        function loadPdf(url, name) {
            currentPdfUrl = url;
            pdfViewer.src = url;
            currentPdfTitle.textContent = name;
            pdfPlaceholder.style.display = 'none';
            pdfViewer.style.display = 'block';
        }

        // 다운로드 버튼
        downloadBtn.addEventListener('click', function() {
            if (currentPdfUrl) {
                const link = document.createElement('a');
                link.href = currentPdfUrl;
                link.download = currentPdfUrl.split('/').pop();
                link.click();
            } else {
                alert('다운로드할 PDF를 먼저 선택해주세요.');
            }
        });

        // 전체화면 버튼
        fullscreenBtn.addEventListener('click', function() {
            const container = document.querySelector('.pdf-viewer-content');
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            } else if (container.msRequestFullscreen) {
                container.msRequestFullscreen();
            }
        });

        // 페이지 로드 시 첫 번째 PDF 자동 로드
        window.addEventListener('load', function() {
            const firstButton = document.querySelector('.pdf-button.active');
            if (firstButton) {
                const pdfUrl = firstButton.getAttribute('data-pdf');
                const pdfName = firstButton.textContent.trim();
                loadPdf(pdfUrl, pdfName);
            }
        });
    </script>
    <script src="js/navigation.js"></script>
</body>
</html>
